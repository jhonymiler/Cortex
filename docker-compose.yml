# Cortex Memory System - Docker Compose
# 
# Arquitetura:
# ┌─────────────────────────────────────────────────────────────────┐
# │                        NGINX (porta 80/443)                    │
# │                      Proxy Reverso + SSL                       │
# └───────────────────────────┬─────────────────────────────────────┘
#                             │
#               ┌─────────────┴─────────────┐
#               │                           │
#               ▼                           ▼
# ┌─────────────────────────┐    ┌─────────────────────────┐
# │      CORTEX-API         │    │       NEO4J             │
# │     (FastAPI:8000)      │───►│   (Bolt:7687)           │
# │                         │    │   (HTTP:7474)           │
# └─────────────────────────┘    └─────────────────────────┘
#
# Uso:
#   docker compose up -d              # Inicia todos os serviços
#   docker compose logs -f cortex-api # Logs da API
#   docker compose down               # Para todos os serviços
#

services:
  # ===================== NEO4J (Banco de Grafos) =====================
  neo4j:
    image: neo4j:5.15-community
    container_name: cortex-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP (Browser)
      - "7687:7687"   # Bolt (Driver)
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-cortex_memory_2026}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=512m
      - NEO4J_dbms_memory_heap_max__size=1G
      - NEO4J_dbms_memory_pagecache_size=512m
      # Performance tuning
      - NEO4J_dbms_transaction_timeout=60s
      - NEO4J_dbms_lock_acquisition_timeout=30s
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    networks:
      - cortex-network
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ===================== CORTEX API =====================
  cortex-api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cortex-api
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      # Neo4j Connection
      - CORTEX_STORAGE_BACKEND=neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-cortex_memory_2026}
      
      # Cortex Config
      - CORTEX_DATA_DIR=/app/data
      - CORTEX_LOG_LEVEL=${CORTEX_LOG_LEVEL:-INFO}
      - CORTEX_HOST=0.0.0.0
      - CORTEX_PORT=8000
      
      # Ollama (para embeddings/LLM)
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - CORTEX_EMBEDDING_MODEL=${CORTEX_EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      
      # Identity Kernel (Memory Firewall)
      - CORTEX_IDENTITY_ENABLED=${CORTEX_IDENTITY_ENABLED:-true}
      - CORTEX_IDENTITY_MODE=${CORTEX_IDENTITY_MODE:-pattern}
    volumes:
      - cortex_data:/app/data
      - cortex_logs:/app/logs
    networks:
      - cortex-network
    depends_on:
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===================== NGINX (Proxy Reverso) =====================
  nginx:
    image: nginx:alpine
    container_name: cortex-nginx
    restart: unless-stopped
    ports:
      - "8081:80"      # HTTP (alterado de 80 para 8081 - porta 80 em uso)
      - "8443:443"     # HTTPS (alterado de 443 para 8443)
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - cortex-network
    depends_on:
      cortex-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

# ===================== VOLUMES =====================
volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_plugins:
    driver: local
  cortex_data:
    driver: local
  cortex_logs:
    driver: local
  nginx_logs:
    driver: local

# ===================== NETWORKS =====================
networks:
  cortex-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16
