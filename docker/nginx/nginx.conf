# Cortex Nginx Configuration
#
# Proxy reverso para API Cortex com:
# - Rate limiting
# - CORS headers
# - Gzip compression
# - Security headers
# - Health check endpoint

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/json;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=100r/s;
    limit_req_zone $binary_remote_addr zone=memory_limit:10m rate=50r/s;
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Upstream servers
    upstream cortex_api {
        server cortex-api:8000;
        keepalive 32;
    }

    # Main server
    server {
        listen 80;
        listen [::]:80;
        server_name localhost cortex.local;

        # Security headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # CORS headers (adjust origins for production)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Cortex-Namespace,X-Cortex-User' always;
        add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        add_header 'Access-Control-Max-Age' 86400 always;

        # Health check (Nginx itself)
        location = /health {
            access_log off;
            return 200 '{"status":"healthy","service":"nginx"}';
        }

        # CORS preflight
        location @cors_preflight {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Cortex-Namespace,X-Cortex-User';
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        # API Health check (proxy to Cortex)
        location = /api/health {
            proxy_pass http://cortex_api/health;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # Memory endpoints (rate limited)
        location /memory/ {
            # Handle CORS preflight
            if ($request_method = OPTIONS) {
                return 204;
            }

            limit_req zone=memory_limit burst=20 nodelay;
            limit_conn conn_limit 50;

            proxy_pass http://cortex_api/memory/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
            
            # Pass Cortex headers
            proxy_set_header X-Cortex-Namespace $http_x_cortex_namespace;
            proxy_set_header X-Cortex-User $http_x_cortex_user;

            # Timeouts
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;

            # Buffer settings
            proxy_buffering on;
            proxy_buffer_size 4k;
            proxy_buffers 8 4k;
        }

        # Identity Kernel endpoints
        location /identity/ {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://cortex_api/identity/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Namespace management
        location /namespaces {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://cortex_api/namespaces;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # OpenAPI docs (no rate limit for docs)
        location /docs {
            proxy_pass http://cortex_api/docs;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Connection "";
        }

        location /openapi.json {
            proxy_pass http://cortex_api/openapi.json;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        location /redoc {
            proxy_pass http://cortex_api/redoc;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
        }

        # Catch-all for other API endpoints
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://cortex_api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";
        }

        # Error pages
        error_page 500 502 503 504 /50x.json;
        location = /50x.json {
            internal;
            return 500 '{"error":"internal_server_error","message":"Service temporarily unavailable"}';
        }
    }

    # Include additional configs
    include /etc/nginx/conf.d/*.conf;
}
